# ベンチマークマトリクス定義。
# routing はタグ単位（provider_routing.tags）。ワークフロー側のステップに
# coding（implement / fix）と review（3並列レビュー）のタグを付けてあり、
# combo は coding / review タグを差し替える。final-gate タグ（takt#954、
# merge-readiness-final-gate のサブステップに review と併記。後のタグが
# 上書きするため review 定義があっても final-gate 定義が勝つ）は全 combo で
# codex (gpt-5.5) に固定し、「merge 可能」の合格バーを一定にする —
# ベンチは「ローカル構成が codex の品質バーに何周で到達するか」を測る。
# loop monitor の judge は provider_routing を通らないため、workflow 側で
# codex に直接固定してある（bench.yaml の loop_monitors 参照）。
workflow: bench
task_file: task.md
repetitions: 1

combos:
  - id: codex-all
    description: coder も codex (gpt-5.5)。レビュアーも codex
    routing:
      tags:
        coding: { provider: codex, model: gpt-5.5 }
        review: { provider: codex, model: gpt-5.5 }
        final-gate: { provider: codex, model: gpt-5.5 }

  - id: qwen-coder
    description: coder のみ Qwen3-Coder-next。レビュアーは codex (gpt-5.5)
    routing:
      tags:
        coding: { provider: opencode, model: ollama-cloud/qwen3-coder-next }
        review: { provider: codex, model: gpt-5.5 }
        final-gate: { provider: codex, model: gpt-5.5 }

  - id: qwen-coder_gemma-reviewer
    description: coder は Qwen3-Coder-next、レビュアーは Gemma 4 31B（どちらも ollama-cloud）。レビュアー品質の比較用で、review 固定の他 combo とは比較軸が異なる
    routing:
      tags:
        coding: { provider: opencode, model: ollama-cloud/qwen3-coder-next }
        review: { provider: opencode, model: ollama-cloud/gemma4:31b }
        final-gate: { provider: codex, model: gpt-5.5 }

  - id: codex-all-fc
    description: FC 機構検証用のフル codex 版。台帳ライフサイクル・findings 条件・ゲート連動をクラウド局所障害と切り離して検証する
    workflow: bench-fc
    routing:
      tags:
        coding: { provider: codex, model: gpt-5.5 }
        review: { provider: codex, model: gpt-5.5 }
        final-gate: { provider: codex, model: gpt-5.5 }

  - id: codex-coder_gemma-reviewer-fc
    description: FC 実戦検証用。coder のみ codex（ollama-cloud の coder-next が不安定な時間帯の代替）、レビュアーは Gemma 4 31B、台帳・ゲートは codex。bench-fc を使う
    workflow: bench-fc
    routing:
      tags:
        coding: { provider: codex, model: gpt-5.5 }
        review: { provider: opencode, model: ollama-cloud/gemma4:31b }
        final-gate: { provider: codex, model: gpt-5.5 }

  - id: qwen-coder_gemma-reviewer-fc
    description: deep 編成 + Finding Contract。coder は Qwen3-Coder-next、レビュアーは Gemma 4 31B、台帳管理と最終ゲートは codex。bench-fc ワークフローを使う
    workflow: bench-fc
    routing:
      tags:
        coding: { provider: opencode, model: ollama-cloud/qwen3-coder-next }
        review: { provider: opencode, model: ollama-cloud/gemma4:31b }
        final-gate: { provider: codex, model: gpt-5.5 }

  - id: qwen-coder_qwen-coder-reviewer
    description: coder もレビュアーも Qwen3-Coder-next。コーダー特化モデルをレビューに転用するミスマッチ検証（当初の「coder 系はレビューで幻覚する」仮説の有効測定）
    routing:
      tags:
        coding: { provider: opencode, model: ollama-cloud/qwen3-coder-next }
        review: { provider: opencode, model: ollama-cloud/qwen3-coder-next }
        final-gate: { provider: codex, model: gpt-5.5 }

  - id: qwen-coder_qwen-instruct-reviewer
    description: coder は Qwen3-Coder-next、レビュアーは Qwen3.5 397B instruct（ollama-cloud）。コーダー系ではなく instruct 系をレビュアーに立てる実験
    routing:
      tags:
        coding: { provider: opencode, model: ollama-cloud/qwen3-coder-next }
        review: { provider: opencode, model: ollama-cloud/qwen3.5:397b }
        final-gate: { provider: codex, model: gpt-5.5 }

# ハーネス疎通確認用（--smoke 指定時のみ生成・実行、API 消費なし）

  - id: tl-codex-leader
    description: team-leader 版 deep+FC。リーダー（分割・統括）だけ codex、worker は coder-next、レビュアーは gemma。planner-limited 仮説の強リーダー側
    workflow: bench-fc-tl
    routing:
      tags:
        leader: { provider: codex, model: gpt-5.5 }
        coding: { provider: opencode, model: ollama-cloud/qwen3-coder-next }
        review: { provider: opencode, model: ollama-cloud/gemma4:31b }
        final-gate: { provider: codex, model: gpt-5.5 }

  - id: tl-gemma-leader
    description: team-leader 版 deep+FC。リーダーもローカル（gemma）に置く実用構成側。TL-codex と比較してリーダー容量の効果を分離する
    workflow: bench-fc-tl
    routing:
      tags:
        leader: { provider: opencode, model: ollama-cloud/gemma4:31b }
        coding: { provider: opencode, model: ollama-cloud/qwen3-coder-next }
        review: { provider: opencode, model: ollama-cloud/gemma4:31b }
        final-gate: { provider: codex, model: gpt-5.5 }

  # ===== v2 世代: builtin for-local-llm ファミリー（max_steps 50）に乗り換え =====
  # ワークフローは takt 本体の builtin を名前解決で使う（.takt/workflows に
  # コピーしない）。台帳 manager は persona_providers で codex に固定する。

  - id: v2-cqrs-baseline
    description: v2 基準系（難所軸）。題材は在庫ES、workflow は builtin backend-cqrs-for-local-llm。coder は Qwen3-Coder-next、レビュアーは Gemma 4 31B、最終ゲートと台帳 manager は codex
    workflow: backend-cqrs-for-local-llm
    persona_providers:
      findings-manager: { provider: codex, model: gpt-5.5 }
    routing:
      tags:
        plan: { provider: opencode, model: ollama-cloud/qwen3-coder-next }
        coding: { provider: opencode, model: ollama-cloud/qwen3-coder-next }
        review: { provider: opencode, model: ollama-cloud/gemma4:31b }
        final-gate: { provider: codex, model: gpt-5.5 }

  - id: v2-ordinary-baseline
    description: v2 基準系（主戦場軸）。題材はタスク管理サービス層（通常コード）、workflow は builtin backend-for-local-llm。配役は v2-cqrs-baseline と同一
    workflow: backend-for-local-llm
    subject: subject-ordinary
    task_file: task-ordinary.md
    persona_providers:
      findings-manager: { provider: codex, model: gpt-5.5 }
    routing:
      tags:
        plan: { provider: opencode, model: ollama-cloud/qwen3-coder-next }
        coding: { provider: opencode, model: ollama-cloud/qwen3-coder-next }
        review: { provider: opencode, model: ollama-cloud/gemma4:31b }
        final-gate: { provider: codex, model: gpt-5.5 }


smoke:
  id: mock-smoke
  description: mock プロバイダによるハーネス疎通確認
  routing:
    tags:
      coding: { provider: mock }
      review: { provider: mock }
      final-gate: { provider: mock }
