# 再走査証跡 v1（表のみ要求）vs v2（全章列挙必須・集約禁止）
description: 該当なし潰しゲーミングを v2 契約が塞ぐか
prompts:
  - id: file://prompts/round2-rescan.txt
    label: rescan-v1
  - id: file://prompts/round2-rescan-v2.txt
    label: rescan-v2
providers:
  - id: 'exec: bash providers/gemma.sh'
    label: gemma4-31b
  - id: 'exec: bash providers/qwen-coder-next.sh'
    label: qwen3-coder-next
  - id: 'exec: bash providers/qwen-instruct.sh'
    label: qwen3.5-397b
defaultTest:
  vars:
    code: file://fixtures/flawed-index.ts.txt
    previous_report: file://fixtures/previous-report.md
tests:
  - description: 再走査の実質性と罠検出
    assert:
      - type: javascript
        value: "/再走査証跡/.test(output)"
        metric: rescan-table-present
      - type: javascript
        value: |
          return (() => {
            const m = output.match(/再走査証跡[\s\S]*?(?=\n## |$)/);
            if (!m) return false;
            const rows = m[0].split('\n').filter(l => /^\|/.test(l) && !/^[|\s:-]+$/.test(l) && !/照合した/.test(l));
            const sectionNames = rows.map(r => (r.split('|')[1] || '').trim()).filter(s => s && s !== '該当なし');
            return sectionNames.length >= 5 || `列挙された章: ${sectionNames.length} (${sectionNames.slice(0,3).join('/')})`;
          })()
        metric: sections-enumerated
      - type: javascript
        value: |
          return (() => {
            const m = output.match(/再走査証跡[\s\S]*?(?=\n## |$)/);
            if (!m) return false;
            const rows = m[0].split('\n').filter(l => /^\|/.test(l) && !/^[|\s:-]+$/.test(l) && !/照合した/.test(l));
            const gamed = rows.length <= 1 && rows.every(r => /該当なし/.test(r));
            return !gamed || '該当なし1行に集約されている';
          })()
        metric: no-naashi-gaming
      - type: javascript
        value: "/(出荷|Ship)/i.test(output) && /(全予約|予約合計|すべての予約|全ての予約|reservations = \\{\\}|reserved = 0|合計を減算|全量)/.test(output)"
        metric: T1-ship-bug
      - type: javascript
        value: "/version/.test(output) && /(二重|重複|別々|導出|events\\.length|配列長|配列の長さ)/.test(output)"
        metric: T3-version-dual
      - type: javascript
        value: "/(分割|単一ファイル|モノリ|複数の責務|1ファイル|一つのファイル)/.test(output)"
        metric: T5-monolith
      - type: javascript
        value: "/initialState/.test(output) && /(freeze|可変|mutable|変更可能|不変|readonly|凍結)/i.test(output)"
        metric: T6-mutable-initstate
      - type: javascript
        value: "/## 結果: *(REJECT|IMPROVE)/.test(output)"
        metric: verdict-reject
